name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Typecheck
            command: npm run typecheck
          - name: Lint
            command: npm run lint
          - name: Format check
            command: npm run format:check
          - name: Test
            command: npm test -- --reporter=dot
    permissions:
      contents: read
    defaults:
      run:
        working-directory: agent
    name: ${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: agent/node_modules
          key: ${{ runner.os }}-node-24-node-modules-${{ hashFiles('agent/package-lock.json', 'agent/package.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm install

      - name: ${{ matrix.name }}
        run: ${{ matrix.command }}

  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    defaults:
      run:
        working-directory: agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: agent/package-lock.json

      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: agent/node_modules
          key: ${{ runner.os }}-node-24-node-modules-${{ hashFiles('agent/package-lock.json', 'agent/package.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm install

      - name: Restore Plannotator resources cache
        id: plannotator-cache
        uses: actions/cache@v4
        with:
          path: agent/src/resources/plannotator
          key: ${{ runner.os }}-plannotator-${{ hashFiles('agent/vendor/plannotator-ui/**', 'agent/scripts/build-plannotator-ui.mts') }}

      - name: Set preview package version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          BASE_VERSION="$(npm pkg get version | tr -d '"')"
          SHORT_SHA="$(git rev-parse --short HEAD)"
          npm pkg set version="${BASE_VERSION}-dev.${SHORT_SHA}"

      - name: Build
        env:
          SHEKOHEX_AGENT_SKIP_PLANNOTATOR_BUILD: ${{ steps.plannotator-cache.outputs.cache-hit == 'true' && 'true' || 'false' }}
        run: npm run build

      - name: Pack package
        run: npm pack --ignore-scripts

      - name: Upload package artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: preview-package
          path: agent/*.tgz
          if-no-files-found: error

      - name: Smoke test global install
        shell: bash
        run: |
          PACKAGE_TARBALL="$(ls -1 *.tgz | head -n 1)"
          GLOBAL_PREFIX="$RUNNER_TEMP/npm-global"
          export PATH="$GLOBAL_PREFIX/bin:$PATH"
          npm install --global --prefix "$GLOBAL_PREFIX" "./${PACKAGE_TARBALL}"
          pi --help
