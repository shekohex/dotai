services:
  executor:
    build:
      context: .
      args:
        EXECUTOR_VERSION: ${EXECUTOR_VERSION:-latest}
    image: ${EXECUTOR_IMAGE:-dotai-executor-proxy:latest}
    ports:
      - "${EXECUTOR_HTTP_PORT:-4788}:80"
    environment:
      EXECUTOR_PORT: ${EXECUTOR_PORT:-4788}
      EXECUTOR_DATA_DIR: /var/lib/executor
      EXECUTOR_SCOPE_DIR: /workspace
    volumes:
      - ${EXECUTOR_DATA_VOLUME:-./executor-data}:/var/lib/executor
      - ${EXECUTOR_SCOPE_VOLUME:-./executor-scope}:/workspace
    restart: unless-stopped
