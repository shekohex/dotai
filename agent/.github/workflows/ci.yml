name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Restore node_modules cache
        id: node-modules-cache
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-24-node-modules-${{ hashFiles('package-lock.json', 'package.json') }}

      - name: Install dependencies
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Pack package
        run: npm pack

      - name: Smoke test global install
        shell: bash
        run: |
          PACKAGE_TARBALL="$(ls -1 *.tgz | head -n 1)"
          GLOBAL_PREFIX="$RUNNER_TEMP/npm-global"
          export PATH="$GLOBAL_PREFIX/bin:$PATH"
          npm install --global --prefix "$GLOBAL_PREFIX" "./${PACKAGE_TARBALL}"
          pi --help

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore
